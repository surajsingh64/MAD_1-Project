{% extends 'base.html' %}
{% block content %}
    
<div class="container">
<div class="row justify-content-center align-items-center vh-100">
<div class="col-md-5">

<div class="card shadow-lg border-0 rounded-4 card-body p-5 py-4">

<form method="POST">

<div class="text-center mb-4">
<h2 class="d-inline">Register </h2> 
<span class="text-primary fw-light">( as company )</span>
</div>

<div class="mb-1">
<label class="form-label fw-medium">Company Name</label>
<input name="company_name" placeholder="Company Name" required class="form-control"><br>
</div>

<div class="mb-1">
<label class="form-label fw-medium">Email address</label>
<input type="email" name="email" class="form-control" placeholder="Company email address" required><br>
</div>

<div class="mb-2">
<label class="form-label fw-medium">Password</label>
<input type="password" name="password" class="form-control" placeholder="Create password" required><br>
</div>

<div class="text-center">
<button type="submit" class="btn btn-primary px-5">Register</button>
</div>

<p class="text-center mt-2">
Want to register as a student?
<a href="{{ url_for('auth_bp.register_student') }}" class="text-primary">
Click here
</a>
</p>

</form>

</div>
</div>
</div>
</div>

{% endblock %}

{% extends 'base.html' %}
{% block content %}

<div class="container">
<div class="row justify-content-center align-items-center vh-100">
<div class="col-md-5">
<div class="card shadow-lg border-0 rounded-4 p-5 py-4">
        
<form method="POST">

        <!-- Title -->

        <div class="text-center mb-4">
                <h2 class="d-inline">Register</h2>
                <span class="text-primary fw-light">(as student)</span>
        </div>


        <!-- Name -->

        <div class="mb-3">
                <label class="form-label fw-medium">Name</label>
                <input type="text" name="name" placeholder="Enter your name"required class="form-control">
        </div>


        <!-- Roll Number -->

        <div class="mb-3">
                <label class="form-label fw-medium">Roll No</label>
                <input type="text"name="roll_no"placeholder="Enter your roll number"required class="form-control">
        </div>


        <!-- Email -->

        <div class="mb-3">
                <label class="form-label fw-medium">Email address</label>
                <input type="email" name="email" class="form-control" placeholder="email address" required>
        </div>


        <!-- Password -->

        <div class="mb-3">
                <label class="form-label fw-medium">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create password" required>
        </div>


        <!-- Register Button -->

        <div class="text-center">
                <button type="submit" class="btn btn-primary px-5">
                Register
                </button>
        </div>


<!-- Switch Register -->

        <p class="text-center mt-3">

            Want to register as a company?

            <a href="{{ url_for('auth_bp.register_company') }}" class="text-primary">
            Click here
            </a>

        </p>

</form>

</div>
</div>
</div>
</div>

{% endblock %}

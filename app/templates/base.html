<!DOCTYPE html>
<html>
<head>
    <title>Placement Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar custom-navbar px-4 fixed-top">
    <span class="navbar-brand text-white">Placement Portal</span>

    {% if current_user.is_authenticated %}
        <a href="{{ url_for('auth.logout') }}" class="btn btn-danger btn-sm">Logout</a>
    {% endif %}

    {% if not current_user.is_authenticated %}
        <a href="{{ url_for('auth.login') }}" class="btn btn-success btn-sm">Login</a>
    {% endif %}
</nav>

{% block content %}{% endblock %}

</body>
</html>

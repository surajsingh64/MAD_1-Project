{% if all_blocked_companies %}
<h4> Blacklisted Companies</h4>
<table class="table table-striped table-bordered mt-3">
    <thead >
        <tr>
            <th>ID</th>
            <th>Company Name</th>
            <th>Email</th>
            <th class="text-center">Action</th>
        </tr>
    </thead>
    <tbody>
        {% for company in all_blocked_companies %}
        <tr>
            <td>{{ company.id }}</td>
            <td>{{ company.company_name }}</td>
            <td>{{ company.user.email }}</td>

            <td class="text-center">
                <a href="{{ url_for('admin.whitelist_company', id=company.id) }}"
                   class="btn btn-success btn-sm">
                   Whitelist
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>

</table>

{% else %}

    <p class="text-muted mt-3">No blacklisted companies</p>

{% endif %}

{% if all_pending_companies %}

<table class="table table-bordered table-hover align-middle">

    <thead class="table-light">
        <tr>
            <th>#</th>
            <th>Company Name</th>
            <th>Email</th>
            <th class="text-center">Action</th>
        </tr>
    </thead>

    <tbody>

        {% for company in all_pending_companies %}

        <tr>

            <td>{{ loop.index }}</td>
            <td>{{ company.company_name }}</td>
            <td>{{ company.user.email }}</td>
            <td class="text-center">
                <a href="{{ url_for('admin.approve_company', id=company.id) }}"
                   class="btn btn-success btn-sm me-2">
                   Approve
                </a>
                <a href="{{ url_for('admin.block_company', id=company.id) }}"
                   class="btn btn-danger btn-sm">
                   Blacklist
                </a>
            </td>
        </tr>

        {% endfor %}

    </tbody>
</table>

{% else %}
<p class="text-muted">No pending companies</p>
{% endif %}

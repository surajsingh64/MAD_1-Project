{% if all_pending_companies %}

<table class="table table-striped table-bordered mt-3">
    <thead class="table-light">
        <tr>
            <th>ID</th>
            <th>Company Name</th>
            <th>Email</th>
            <th class="text-center">Action</th>
        </tr>
    </thead>

    <tbody>
        {% for company in all_pending_companies %}
        <tr>
            <td>{{ company.id }}</td>
            <td>{{ company.company_name }}</td>
            <td>{{ company.user.email }}</td>

            <td class="text-center">

                <a href="{{ url_for('admin.approve_company', id=company.id) }}"
                   class="btn btn-success btn-sm">
                   Approve
                </a>

                <a href="{{ url_for('admin.block_company', id=company.id) }}"
                   class="btn btn-danger btn-sm">
                   Reject
                </a>

            </td>
        </tr>
        {% endfor %}
    </tbody>

</table>

{% else %}

<p class="text-muted mt-3">No pending companies</p>

{% endif %}

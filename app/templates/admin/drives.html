{% if pending_drives %}

<table class="table table-striped table-bordered mt-3">
    <thead class="table-light">
        <tr>
            <th>ID</th>
            <th>Company Name</th>
            <th>Job Title</th>
            <th class="text-center">Action</th>
        </tr>
    </thead>

    <tbody>
        {% for drive in pending_drives %}
        <tr>
            <td>{{ drive.id }}</td>
            <td>{{ drive.company_name }}</td>
            <td>{{ drive.job_title }}</td>

            <td class="text-center">

                <a href="{{ url_for('admin.approve_drives', id=drive.id) }}"
                   class="btn btn-success btn-sm">
                   Approve
                </a>

                <a href="{{ url_for('admin.drives_reject', id=drive.id) }}"
                   class="btn btn-danger btn-sm">
                   Reject
                </a>

            </td>
        </tr>
        {% endfor %}
    </tbody>

</table>

{% else %}

<p class="text-muted mt-3">No pending drives</p>

{% endif %}

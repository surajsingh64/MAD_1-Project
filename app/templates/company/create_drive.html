{% extends "base.html" %}

{% block content %}

<div class="container-fluid py-4">

    <!-- ===== Header ===== -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">Create Placement Drive</h3>

    <!-- ===== Form Card ===== -->
    <div class="card shadow-sm border-0">
        <div class="card-body">
            <form method="POST">
                <div class="row g-4">

                    <!-- Job Title -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Job Title *</label>
                        <input type="text" name="job_title"
                               class="form-control"
                               placeholder="e.g. Software Engineer"
                               required>
                    </div>

                    <!-- Deadline -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Application Deadline *</label>
                        <input type="date" name="deadline"
                               class="form-control"
                               required>
                    </div>

                    <!-- Eligibility -->
                    <div class="col-12">
                        <label class="form-label fw-semibold">Eligibility Criteria</label>
                        <input type="text" name="eligibility"
                               class="form-control"
                               placeholder="e.g. B.Tech CSE, 7+ CGPA">
                    </div>

                      <!-- salary -->
                    <div class="col-12">
                        <label class="form-label fw-semibold">salary</label>
                        <input type="intger" name="salary"
                               class="form-control">
                    </div>
                    
                    <!-- Description -->
                    <div class="col-12">
                        <label class="form-label fw-semibold">Job Description</label>
                        <textarea name="description"
                                  class="form-control"
                                  rows="4"
                                  placeholder="Enter job role, required skills, responsibilities..."></textarea>
                    </div>

                    <!-- Submit Button -->
                    <div class="col-12 text-center">
                        <button type="submit" class="btn btn-primary px-5 py-2">
                            Create Drive
                        </button>
                    </div>

                </div>
            </form>
        </div>
    </div>

</div>

{% endblock %}

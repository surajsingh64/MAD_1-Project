
<div class="container py-4">

    <!-- Title -->
    <h4 class="fw-bold mb-4">Organizations</h4>

    <!-- Card -->
    <div class="card shadow-sm border-0">
        <div class="card-body">

            {% if companies %}
                {% for c in companies %}

                <!-- Row Item -->
                <div class="d-flex justify-content-between align-items-center border rounded px-3 py-2 mb-2">

                    <!-- Company Name -->
                    <span class="fw-semibold text-muted">
                        {{ c.company_name }}
                    </span>

                    <!-- Button -->
                
                <a href="{{ url_for('student.company_drives', company_id=c.id) }}"
                class="btn btn-sm btn-outline-primary px-3">
                    View Details
                </a>
                </div>

                {% endfor %}
            {% else %}
                <p class="text-muted text-center">No organizations available</p>
            {% endif %}

        </div>
    </div>

</div>
